{% extends 'base.html' %}
{% block title %}Add Property — PropertyLelo{% endblock %}
{% block content %}
<div class="form-page-wrapper">
    <div class="form-card">
        <div class="form-card-header">
            <h2>🏠 Add New Property</h2>
            <p>Fill in the details below. Your listing will go live after admin approval.</p>
        </div>
        <form method="POST" action="{{ url_for('add_property') }}" enctype="multipart/form-data" class="property-form">
            <div class="form-section-title">Basic Information</div>
            <div class="form-grid-2">
                <div class="form-group">
                    <label>Property Title *</label>
                    <input type="text" name="title" placeholder="e.g. Modern 2BHK in Indore" required class="form-input">
                </div>
                <div class="form-group">
                    <label>Property Type *</label>
                    <select name="property_type" class="form-input" required>
                        <option value="">Select Type</option>
                        <option value="Apartment">Apartment</option>
                        <option value="Flat">Flat</option>
                        <option value="Villa">Villa</option>
                        <option value="House">House</option>
                        <option value="PG">PG</option>
                        <option value="Office">Office</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" placeholder="Describe your property in detail..." class="form-input" rows="4"></textarea>
            </div>
            <div class="form-section-title">Location</div>
            <div class="form-grid-2">
                <div class="form-group">
                    <label>Full Address / Area *</label>
                    <input type="text" name="location" placeholder="e.g. Vijay Nagar, Near AB Road" required class="form-input">
                </div>
                <div class="form-group">
                    <label>City *</label>
                    <input type="text" name="city" placeholder="e.g. Indore" required class="form-input">
                </div>
            </div>
            <div class="form-section-title">Property Details</div>
            <div class="form-grid-4">
                <div class="form-group">
                    <label>Rent / Month (₹) *</label>
                    <input type="number" name="price" placeholder="10000" required class="form-input">
                </div>
                <div class="form-group">
                    <label>Bedrooms</label>
                    <input type="number" name="bedrooms" placeholder="2" class="form-input" min="0">
                </div>
                <div class="form-group">
                    <label>Bathrooms</label>
                    <input type="number" name="bathrooms" placeholder="1" class="form-input" min="0">
                </div>
                <div class="form-group">
                    <label>Area (sq.ft)</label>
                    <input type="number" name="area" placeholder="850" class="form-input" min="0">
                </div>
            </div>
            <div class="form-section-title">Property Image</div>
            <div class="form-group">
                <label>Upload Photo</label>
                <input type="file" name="image" accept="image/*" class="form-input file-input">
            </div>
            <div class="form-actions">
                <a href="{{ url_for('dashboard') }}" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-primary">Submit for Approval →</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
