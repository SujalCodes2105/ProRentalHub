{% extends 'base.html' %}
{% block title %}Register — PropertyLelo{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🏠</div>
            <h2>Create Account</h2>
            <p>Join PropertyLelo today — it's free!</p>
        </div>
        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Your full name" required class="form-input">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required class="form-input">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="10-digit mobile number" required class="form-input">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a strong password" required class="form-input">
            </div>
            <div class="form-group">
                <label>Register As</label>
                <select name="role" class="form-input" required>
                    <option value="client">👤 Client (Looking for property)</option>
                    <option value="owner">🏠 Owner (Want to list property)</option>
                </select>
            </div>
            <button type="submit" class="btn-primary full-width">Create Account →</button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
