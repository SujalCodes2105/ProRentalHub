{% extends 'base.html' %}
{% block title %}Login — ProRentalHub{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🏠</div>
            <h2>Welcome Back</h2>
            <p>Sign in to your ProRentalHub account</p>
        </div>
        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required class="form-input">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required class="form-input">
            </div>
            <button type="submit" class="btn-primary full-width">Login →</button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        </div>
        <div class="admin-hint">
            <p>🔐 Admin: <code>admin@prorentalhub.com</code> / <code>admin123</code></p>
        </div>
    </div>
</div>
{% endblock %}
